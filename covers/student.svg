<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <circle cx="200" cy="150" r="220" fill="#3b82f6" opacity="0.08"/>
  <circle cx="1050" cy="500" r="280" fill="#8b5cf6" opacity="0.10"/>
  <circle cx="600" cy="600" r="200" fill="#06b6d4" opacity="0.06"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>

  <!-- Left decorative bracket -->
  <rect x="60" y="180" width="6" height="270" rx="3" fill="url(#accent)" opacity="0.7"/>

  <!-- Tag pill -->
  <rect x="80" y="185" width="160" height="34" rx="17" fill="#3b82f6" opacity="0.2"/>
  <rect x="80" y="185" width="160" height="34" rx="17" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <text x="160" y="207" font-family="'DM Mono', monospace" font-size="12" fill="#93c5fd" text-anchor="middle" letter-spacing="2">🎓 STUDENT PLAN</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" filter="url(#softglow)">The Opposer</text>

  <!-- Subtitle -->
  <text x="82" y="355" font-family="Arial, sans-serif" font-size="26" fill="#93c5fd" font-weight="400">Thesis · Essays · Research Papers · Reports</text>

  <!-- Description line -->
  <text x="82" y="400" font-family="Arial, sans-serif" font-size="17" fill="#94a3b8">Find every weakness before your examiner does.</text>

  <!-- Price block -->
  <rect x="82" y="425" width="200" height="66" rx="14" fill="#3b82f6" opacity="0.15"/>
  <rect x="82" y="425" width="200" height="66" rx="14" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  <text x="182" y="452" font-family="Georgia, serif" font-size="14" fill="#93c5fd" text-anchor="middle" letter-spacing="1">FROM</text>
  <text x="182" y="480" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">$9.99 / mo</text>

  <!-- Right visual — open book + sword -->
  <g transform="translate(750, 80)" filter="url(#glow)">
    <!-- Book left page -->
    <path d="M120 180 Q80 160 40 170 L40 400 Q80 390 120 410 Z" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" opacity="0.9"/>
    <!-- Book right page -->
    <path d="M120 180 Q160 160 200 170 L200 400 Q160 390 120 410 Z" fill="#1e2d5f" stroke="#3b82f6" stroke-width="2" opacity="0.9"/>
    <!-- Spine -->
    <rect x="116" y="180" width="8" height="230" rx="2" fill="#3b82f6" opacity="0.8"/>
    <!-- Lines on left page -->
    <line x1="60" y1="230" x2="110" y2="225" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="250" x2="110" y2="246" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="270" x2="110" y2="267" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="290" x2="110" y2="288" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="310" x2="110" y2="309" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <!-- Lines on right page — some RED (attacked) -->
    <line x1="130" y1="230" x2="180" y2="225" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="130" y1="250" x2="180" y2="246" stroke="#ff3d3d" stroke-width="2" opacity="0.9"/>
    <line x1="130" y1="270" x2="180" y2="267" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <line x1="130" y1="290" x2="180" y2="288" stroke="#ff3d3d" stroke-width="2" opacity="0.9"/>
    <line x1="130" y1="310" x2="180" y2="309" stroke="#93c5fd" stroke-width="1.5" opacity="0.5"/>
    <!-- Sword -->
    <line x1="280" y1="60" x2="80" y2="380" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <polygon points="280,60 268,90 294,82" fill="#8b5cf6"/>
    <rect x="168" y="214" width="40" height="8" rx="4" fill="#ffc62b" transform="rotate(-52, 188, 218)"/>
    <!-- Glow dot on sword tip -->
    <circle cx="280" cy="60" r="8" fill="#8b5cf6" opacity="0.6" filter="url(#glow)"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#000000" opacity="0.3"/>
  <text x="600" y="615" font-family="'DM Mono', monospace" font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="2">OPPOSER.VERCEL.APP · 20 REVIEWS/MONTH · CANCEL ANYTIME</text>
</svg>
