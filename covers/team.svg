<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <circle cx="120" cy="100" r="260" fill="#8b5cf6" opacity="0.07"/>
  <circle cx="1080" cy="520" r="280" fill="#06b6d4" opacity="0.07"/>
  <circle cx="600" cy="580" r="200" fill="#8b5cf6" opacity="0.05"/>

  <!-- Grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Left bracket -->
  <rect x="60" y="180" width="6" height="270" rx="3" fill="url(#accent)" opacity="0.9"/>

  <!-- Tag pill -->
  <rect x="80" y="185" width="150" height="34" rx="17" fill="#8b5cf6" opacity="0.15"/>
  <rect x="80" y="185" width="150" height="34" rx="17" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
  <text x="155" y="207" font-family="'DM Mono', monospace" font-size="12" fill="#c4b5fd" text-anchor="middle" letter-spacing="2">👥 TEAM PLAN</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" filter="url(#softglow)">The Opposer</text>

  <!-- Subtitle -->
  <text x="82" y="355" font-family="Arial, sans-serif" font-size="24" fill="#c4b5fd" font-weight="400">Up to 5 Users · All Document Types · Priority Support</text>

  <!-- Description -->
  <text x="82" y="400" font-family="Arial, sans-serif" font-size="17" fill="#94a3b8">200 reviews/month shared. Law firms · Consultancies · Research groups.</text>

  <!-- Price block -->
  <rect x="82" y="425" width="220" height="66" rx="14" fill="#8b5cf6" opacity="0.12"/>
  <rect x="82" y="425" width="220" height="66" rx="14" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <text x="192" y="452" font-family="Georgia, serif" font-size="14" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">FROM</text>
  <text x="192" y="480" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">$89.99 / mo</text>

  <!-- Right visual — 5 connected nodes (team network) -->
  <g transform="translate(700, 80)" filter="url(#glow)">
    <!-- Connection lines first (behind nodes) -->
    <line x1="200" y1="200" x2="80" y2="120" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
    <line x1="200" y1="200" x2="320" y2="120" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
    <line x1="200" y1="200" x2="80" y2="300" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
    <line x1="200" y1="200" x2="320" y2="300" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
    <line x1="80" y1="120" x2="320" y2="120" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
    <line x1="80" y1="300" x2="320" y2="300" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
    <line x1="80" y1="120" x2="80" y2="300" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
    <line x1="320" y1="120" x2="320" y2="300" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>

    <!-- Centre node — sword icon -->
    <circle cx="200" cy="200" r="48" fill="#1a1030" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="200" y="212" font-size="32" text-anchor="middle">⚔️</text>

    <!-- 4 corner nodes — people -->
    <circle cx="80" cy="120" r="34" fill="#1a1030" stroke="#06b6d4" stroke-width="2"/>
    <text x="80" y="128" font-size="22" text-anchor="middle">👤</text>

    <circle cx="320" cy="120" r="34" fill="#1a1030" stroke="#06b6d4" stroke-width="2"/>
    <text x="320" y="128" font-size="22" text-anchor="middle">👤</text>

    <circle cx="80" cy="300" r="34" fill="#1a1030" stroke="#06b6d4" stroke-width="2"/>
    <text x="80" y="308" font-size="22" text-anchor="middle">👤</text>

    <circle cx="320" cy="300" r="34" fill="#1a1030" stroke="#06b6d4" stroke-width="2"/>
    <text x="320" y="308" font-size="22" text-anchor="middle">👤</text>

    <!-- 5th user badge -->
    <circle cx="200" cy="380" r="28" fill="#1a1030" stroke="#8b5cf6" stroke-width="2"/>
    <text x="200" y="389" font-size="18" text-anchor="middle">👤</text>
    <line x1="200" y1="248" x2="200" y2="352" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>

    <!-- Pulse rings on centre -->
    <circle cx="200" cy="200" r="64" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.2"/>
    <circle cx="200" cy="200" r="80" fill="none" stroke="#8b5cf6" stroke-width="0.5" opacity="0.1"/>

    <!-- Doc icons near nodes -->
    <rect x="40" y="82" width="20" height="26" rx="3" fill="#1e2a3a" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
    <line x1="44" y1="92" x2="56" y2="92" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
    <line x1="44" y1="99" x2="56" y2="99" stroke="#ff3d3d" stroke-width="1.5" opacity="0.8"/>

    <rect x="338" y="82" width="20" height="26" rx="3" fill="#1e2a3a" stroke="#06b6d4" stroke-width="1" opacity="0.8"/>
    <line x1="342" y1="92" x2="354" y2="92" stroke="#94a3b8" stroke-width="1" opacity="0.6"/>
    <line x1="342" y1="99" x2="354" y2="99" stroke="#ff3d3d" stroke-width="1.5" opacity="0.8"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#000000" opacity="0.3"/>
  <text x="600" y="615" font-family="'DM Mono', monospace" font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="2">OPPOSER.VERCEL.APP · 200 REVIEWS/MONTH · UP TO 5 USERS</text>
</svg>
