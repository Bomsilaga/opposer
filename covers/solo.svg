<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1f1a2e"/>
      <stop offset="100%" style="stop-color:#2a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3d3d"/>
      <stop offset="100%" style="stop-color:#ff7a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <circle cx="150" cy="100" r="250" fill="#ff3d3d" opacity="0.06"/>
  <circle cx="1100" cy="530" r="300" fill="#ff7a1a" opacity="0.07"/>
  <circle cx="600" cy="315" r="180" fill="#ffc62b" opacity="0.04"/>

  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Left bracket -->
  <rect x="60" y="180" width="6" height="270" rx="3" fill="url(#accent)" opacity="0.8"/>

  <!-- Tag pill -->
  <rect x="80" y="185" width="130" height="34" rx="17" fill="#ff3d3d" opacity="0.15"/>
  <rect x="80" y="185" width="130" height="34" rx="17" fill="none" stroke="#ff3d3d" stroke-width="1.5" opacity="0.6"/>
  <text x="145" y="207" font-family="'DM Mono', monospace" font-size="12" fill="#fca5a5" text-anchor="middle" letter-spacing="2">SOLO PLAN</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" filter="url(#softglow)">The Opposer</text>

  <!-- Subtitle -->
  <text x="82" y="355" font-family="Arial, sans-serif" font-size="24" fill="#fca5a5" font-weight="400">Contracts · Legal · Visa · Business · HR · Property</text>

  <!-- Description -->
  <text x="82" y="400" font-family="Arial, sans-serif" font-size="17" fill="#94a3b8">Every document type. Full 8-phase adversarial attack.</text>

  <!-- Price block -->
  <rect x="82" y="425" width="210" height="66" rx="14" fill="#ff3d3d" opacity="0.12"/>
  <rect x="82" y="425" width="210" height="66" rx="14" fill="none" stroke="#ff3d3d" stroke-width="1.5" opacity="0.5"/>
  <text x="187" y="452" font-family="Georgia, serif" font-size="14" fill="#fca5a5" text-anchor="middle" letter-spacing="1">FROM</text>
  <text x="187" y="480" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">$19.99 / mo</text>

  <!-- Right visual — document stack with sword -->
  <g transform="translate(720, 90)" filter="url(#glow)">
    <!-- Doc 3 (back) -->
    <rect x="120" y="100" width="200" height="260" rx="8" fill="#1a1a2e" stroke="#4b5563" stroke-width="1.5" opacity="0.7" transform="rotate(8,220,230)"/>
    <!-- Doc 2 (mid) -->
    <rect x="100" y="90" width="200" height="260" rx="8" fill="#1e1e3a" stroke="#6b7280" stroke-width="1.5" opacity="0.85" transform="rotate(3,200,220)"/>
    <!-- Doc 1 (front) -->
    <rect x="80" y="80" width="200" height="260" rx="8" fill="#1e2a3a" stroke="#ff3d3d" stroke-width="2"/>
    <!-- Lines on front doc -->
    <line x1="104" y1="130" x2="256" y2="130" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="104" y1="152" x2="256" y2="152" stroke="#ff3d3d" stroke-width="2" opacity="0.8"/>
    <line x1="104" y1="174" x2="256" y2="174" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="104" y1="196" x2="200" y2="196" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="104" y1="218" x2="256" y2="218" stroke="#ff3d3d" stroke-width="2" opacity="0.8"/>
    <line x1="104" y1="240" x2="220" y2="240" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
    <line x1="104" y1="262" x2="256" y2="262" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
    <!-- Warning markers -->
    <circle cx="270" cy="152" r="8" fill="#ff3d3d" opacity="0.9"/>
    <text x="270" y="157" font-size="10" fill="#fff" text-anchor="middle">!</text>
    <circle cx="270" cy="218" r="8" fill="#ff7a1a" opacity="0.9"/>
    <text x="270" y="223" font-size="10" fill="#fff" text-anchor="middle">!</text>
    <!-- Sword diagonal -->
    <line x1="320" y1="40" x2="60" y2="390" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <polygon points="320,40 306,72 334,62" fill="#ff3d3d"/>
    <rect x="178" y="198" width="44" height="9" rx="4" fill="#ffc62b" transform="rotate(-52,200,202)"/>
    <circle cx="320" cy="40" r="10" fill="#ff3d3d" opacity="0.5" filter="url(#glow)"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#000000" opacity="0.3"/>
  <text x="600" y="615" font-family="'DM Mono', monospace" font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="2">OPPOSER.VERCEL.APP · 30 REVIEWS/MONTH · CANCEL ANYTIME</text>
</svg>
