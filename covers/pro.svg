<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0f1a0f"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff3d3d"/>
      <stop offset="50%" style="stop-color:#ffc62b"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc62b"/>
      <stop offset="100%" style="stop-color:#ff7a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <circle cx="100" cy="80" r="220" fill="#ffc62b" opacity="0.05"/>
  <circle cx="1100" cy="550" r="280" fill="#22c55e" opacity="0.06"/>
  <circle cx="600" cy="200" r="300" fill="#ff3d3d" opacity="0.04"/>

  <!-- Subtle radial from centre -->
  <radialGradient id="centre" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#ffc62b;stop-opacity:0.06"/>
    <stop offset="100%" style="stop-color:#000000;stop-opacity:0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#centre)"/>

  <!-- Grid -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>

  <!-- Gold left bracket -->
  <rect x="60" y="180" width="6" height="270" rx="3" fill="url(#gold)" opacity="0.9"/>

  <!-- Tag pill — BEST VALUE -->
  <rect x="80" y="185" width="190" height="34" rx="17" fill="#ffc62b" opacity="0.15"/>
  <rect x="80" y="185" width="190" height="34" rx="17" fill="none" stroke="#ffc62b" stroke-width="1.5" opacity="0.7"/>
  <text x="175" y="207" font-family="'DM Mono', monospace" font-size="12" fill="#fde68a" text-anchor="middle" letter-spacing="2">🔥 PRO · BEST VALUE</text>

  <!-- Main title -->
  <text x="80" y="300" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" filter="url(#softglow)">The Opposer</text>

  <!-- Subtitle -->
  <text x="82" y="355" font-family="Arial, sans-serif" font-size="24" fill="#fde68a" font-weight="400">All Domains · Domain Skill Packs · Priority Support</text>

  <!-- Description -->
  <text x="82" y="400" font-family="Arial, sans-serif" font-size="17" fill="#94a3b8">80 reviews/month. The most capable analysis available.</text>

  <!-- Price block -->
  <rect x="82" y="425" width="220" height="66" rx="14" fill="#ffc62b" opacity="0.1"/>
  <rect x="82" y="425" width="220" height="66" rx="14" fill="none" stroke="#ffc62b" stroke-width="1.5" opacity="0.6"/>
  <text x="192" y="452" font-family="Georgia, serif" font-size="14" fill="#fde68a" text-anchor="middle" letter-spacing="1">FROM</text>
  <text x="192" y="480" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">$39.99 / mo</text>

  <!-- Right visual — shield with sword -->
  <g transform="translate(730, 70)" filter="url(#glow)">
    <!-- Shield -->
    <path d="M200 40 L340 90 L340 260 Q340 360 200 420 Q60 360 60 260 L60 90 Z" fill="#1a1f2e" stroke="url(#gold)" stroke-width="3" opacity="0.95"/>
    <!-- Shield inner -->
    <path d="M200 70 L320 112 L320 258 Q320 342 200 396 Q80 342 80 258 L80 112 Z" fill="#0f1520" opacity="0.8"/>
    <!-- Shield cross lines -->
    <line x1="200" y1="80" x2="200" y2="390" stroke="#ffc62b" stroke-width="1.5" opacity="0.3"/>
    <line x1="80" y1="235" x2="320" y2="235" stroke="#ffc62b" stroke-width="1.5" opacity="0.3"/>
    <!-- Sword on shield -->
    <line x1="200" y1="100" x2="200" y2="370" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
    <rect x="160" y="210" width="80" height="10" rx="5" fill="#ffc62b"/>
    <polygon points="200,100 188,140 212,140" fill="#ffc62b"/>
    <circle cx="200" cy="375" r="12" fill="#ff7a1a" opacity="0.8"/>
    <!-- Stars around shield -->
    <text x="100" y="130" font-size="16" fill="#ffc62b" opacity="0.7">✦</text>
    <text x="285" y="130" font-size="16" fill="#ffc62b" opacity="0.7">✦</text>
    <text x="80" y="310" font-size="12" fill="#ffc62b" opacity="0.5">✦</text>
    <text x="305" y="310" font-size="12" fill="#ffc62b" opacity="0.5">✦</text>
    <!-- Phase badges -->
    <rect x="40" y="155" width="30" height="20" rx="4" fill="#ff3d3d" opacity="0.8"/>
    <text x="55" y="169" font-family="'DM Mono',monospace" font-size="9" fill="#fff" text-anchor="middle">P2</text>
    <rect x="330" y="155" width="30" height="20" rx="4" fill="#22c55e" opacity="0.8"/>
    <text x="345" y="169" font-family="'DM Mono',monospace" font-size="9" fill="#fff" text-anchor="middle">P8</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#000000" opacity="0.3"/>
  <text x="600" y="615" font-family="'DM Mono', monospace" font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="2">OPPOSER.VERCEL.APP · 80 REVIEWS/MONTH · CANCEL ANYTIME</text>
</svg>
